name: Moneyboy
options:
  bundleIdPrefix: com.moneyboy
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true

targets:
  Moneyboy:
    type: application
    platform: iOS
    sources:
      - path: Moneyboy
    info:
      path: Moneyboy/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moneyboy.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "6"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: 8UW4GXUZ76
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Moneyboy/Info.plist

  MoneyboyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoneyboyTests
    dependencies:
      - target: Moneyboy
    settings:
      base:
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: 8UW4GXUZ76
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moneyboy.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Moneyboy"
        BUNDLE_LOADER: "$(TEST_HOST)"
